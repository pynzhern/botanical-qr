<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Frangipani QR — single vs branched</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #e7e9df; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #243024; }
    .wrap { display: flex; height: 100%; }
    .panel { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid rgba(36,48,36,0.12); }
    .panel:last-child { border-right: none; }
    .label { padding: 12px 18px; font-size: 13px; font-weight: 650; letter-spacing: 0.02em; display: flex; align-items: baseline; gap: 8px; }
    .label small { font-weight: 500; color: #586253; font-size: 12px; }
    .frame { flex: 1; position: relative; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
    @media (max-width: 720px) { .wrap { flex-direction: column; } .panel { border-right: none; border-bottom: 1px solid rgba(36,48,36,0.12); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="label">single <small>· v21 — one rosette + posy (current)</small></div>
      <div class="frame"><iframe src="frangipani-qr-v21.html?form=plant" title="frangipani — single"></iframe></div>
    </div>
    <div class="panel">
      <div class="label">branched <small>· v24 — upright candelabra, no overhang, buds</small></div>
      <div class="frame"><iframe src="frangipani-qr-v24.html" title="frangipani — branched"></iframe></div>
    </div>
  </div>
</body>
</html>
