<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Botanical QR · scannable plants</title>
  <meta name="description" content="The top-down view is a real, scannable QR code; tilt it and a 3D plant grows from the same pixels." />
  <meta name="theme-color" content="#f5f3f3" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23344b2f'/%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #2a2a2e; --muted: #6b6b72; --accent: #c24d77; --bg: #f7f1f3;
      --panel: rgba(255,255,255,0.72); --panel-line: rgba(20,20,24,0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); transition: background 0.5s ease; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: var(--ink); }
    #app { position: fixed; inset: 0; }
    canvas { display: block; touch-action: none; }

    .hud { position: fixed; inset: 0; pointer-events: none;
      padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      display: flex; flex-direction: column; justify-content: space-between; }

    /* brand mark + about popover */
    .top { display: flex; flex-direction: column; align-items: flex-start; }
    .brand { pointer-events: auto; display: inline-flex; align-items: center; gap: 9px; }
    /* stacked pyn/zhern signature — sits in the empty left margin, clear of the plant and the wordmark */
    .page-mark { position: fixed; left: 26px; top: 50%; transform: translateY(-50%);
      width: 58px; height: auto; opacity: 0.82; pointer-events: none; user-select: none; z-index: 2; }
    @media (max-width: 720px) { .page-mark { display: none; } }
    .mark { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 650; letter-spacing: -0.01em; color: var(--ink); }
    .mark .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--accent); transition: background 0.45s ease; }
    .pill { font: inherit; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--panel);
      -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); border: 1px solid var(--panel-line);
      border-radius: 999px; padding: 5px 12px; cursor: pointer; transition: color 0.18s, background 0.18s; }
    .pill:hover { color: var(--ink); background: #fff; }
    .about { pointer-events: auto; margin-top: 12px; max-width: 330px;
      background: var(--panel); -webkit-backdrop-filter: blur(22px); backdrop-filter: blur(22px);
      border: 1px solid var(--panel-line); border-radius: 16px; padding: 16px 18px; box-shadow: 0 18px 50px rgba(20,20,24,0.13);
      opacity: 0; transform: translateY(-6px); visibility: hidden; transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s; }
    .about.open { opacity: 1; transform: none; visibility: visible; }
    .about .lead { font-size: 15px; font-weight: 650; color: var(--ink); margin: 0 0 7px; }
    .about p { font-size: 13px; line-height: 1.5; color: var(--muted); margin: 0 0 9px; }
    .about .hint { font-size: 12px; color: var(--muted); opacity: 0.85; margin: 0; }

    /* control dock — one glass panel */
    .dock { pointer-events: auto; align-self: center; display: flex; flex-wrap: wrap; align-items: center; gap: 7px;
      background: var(--panel); -webkit-backdrop-filter: blur(22px); backdrop-filter: blur(22px);
      border: 1px solid var(--panel-line); border-radius: 18px; padding: 7px; box-shadow: 0 12px 40px rgba(20,20,24,0.12); }
    .divider { width: 1px; align-self: stretch; margin: 3px 2px; background: var(--panel-line); }

    .seg { display: inline-flex; background: rgba(20,20,24,0.05); border-radius: 12px; padding: 3px; }
    .seg button { border: none; background: transparent; color: var(--ink); font: inherit; font-size: 13px; font-weight: 600;
      padding: 7px 13px; border-radius: 9px; cursor: pointer; transition: background 0.18s, color 0.18s; white-space: nowrap; }
    .seg button.on { background: var(--accent); color: #fff; }
    .seg button:disabled { opacity: 0.5; cursor: default; }
    .seg.hidden { display: none; }

    input { font: inherit; font-size: 13.5px; color: var(--ink); background: transparent; border: none;
      border-radius: 10px; padding: 8px 12px; width: 188px; outline: none; }
    input::placeholder { color: var(--muted); }

    .btn { font: inherit; font-size: 13px; font-weight: 600; color: var(--ink); background: rgba(20,20,24,0.05);
      border: none; border-radius: 11px; padding: 8px 14px; cursor: pointer; transition: background 0.18s, transform 0.1s; white-space: nowrap; }
    .btn:hover { background: rgba(20,20,24,0.09); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* save menu */
    .menu-wrap { position: relative; }
    .menu { position: absolute; bottom: calc(100% + 8px); right: 0; min-width: 172px;
      background: var(--panel); -webkit-backdrop-filter: blur(22px); backdrop-filter: blur(22px);
      border: 1px solid var(--panel-line); border-radius: 14px; padding: 6px; box-shadow: 0 18px 50px rgba(20,20,24,0.16);
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0; transform: translateY(6px); visibility: hidden; transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s; }
    .menu.open { opacity: 1; transform: none; visibility: visible; }
    .menu button { text-align: left; background: transparent; border: none; border-radius: 9px; padding: 9px 12px;
      font: inherit; font-size: 13px; font-weight: 600; color: var(--ink); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .menu button:hover { background: rgba(20,20,24,0.06); }
    .menu button:disabled { opacity: 0.4; cursor: default; }
    .menu .meta { font-size: 11px; font-weight: 500; color: var(--muted); }

    /* recording overlay: covers the frozen live view and shows the square loop being captured
       (the export canvas must be on-screen for Safari to capture its stream) */
    #recOverlay { position: fixed; inset: 0; z-index: 40; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; background: var(--bg); transition: background 0.5s ease; }
    #recOverlay.on { display: flex; }
    #recOverlay canvas { width: auto; height: 84vmin; max-width: 92vmin; border-radius: 16px; box-shadow: 0 18px 60px rgba(20,20,24,0.14); }
    /* slim progress bar (no text / no percentages) — fills as the loop records / encodes */
    #recBar { width: clamp(200px, 40vmin, 340px); height: 4px; border-radius: 999px;
      background: rgba(20, 20, 24, 0.10); overflow: hidden; }
    #recBar > i { display: block; height: 100%; width: 0%; border-radius: 999px;
      background: var(--accent); transition: width 0.18s linear; }
    /* indeterminate sweep while the gif encoder lib loads (before real progress starts) */
    #recBar.indet > i { width: 38%; transition: none; animation: recIndet 1.05s ease-in-out infinite; }
    @keyframes recIndet { 0% { margin-left: -38%; } 100% { margin-left: 100%; } }

    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; letter-spacing: 0.04em; pointer-events: none; transition: opacity 0.4s; }
    #loading.gone { opacity: 0; }

    @media (max-width: 680px) {
      .hud { padding: max(14px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom)) 14px; }
      .dock { align-self: stretch; border-radius: 16px; }
      input { flex: 1 1 120px; width: auto; min-width: 0; }
      .about { max-width: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loading">growing…</div>
  <div class="hud">
    <img id="pageMark" class="page-mark" alt="" aria-hidden="true" />
    <div class="top">
      <div class="brand">
        <span class="mark"><span class="dot"></span>Botanical QR</span>
        <button class="pill" id="aboutBtn" aria-expanded="false" aria-controls="aboutCard">about</button>
      </div>
      <div class="about" id="aboutCard" role="region" aria-label="about Botanical QR">
        <p class="lead">Scannable plants.</p>
        <p>The top-down view is a real, scannable QR code; tilt it and a 3D plant grows from the same pixels.</p>
        <p class="hint">drag to spin · tap the plant to flatten / grow</p>
        <p class="hint">after Reactiive's cherry-blossom-qrcode</p>
      </div>
    </div>
    <div class="dock" role="group" aria-label="controls">
      <span class="seg" id="plantSeg" role="group" aria-label="choose plant">
        <button data-model="caladium-h" class="on" aria-pressed="true">caladium · fine</button>
        <button data-model="caladium-m" aria-pressed="false">caladium · coarse</button>
        <button data-model="pine" data-season="forest" aria-pressed="false">pine · forest</button>
        <button data-model="pine" data-season="snow" aria-pressed="false">pine · snow</button>
      </span>
      <span class="divider"></span>
      <input id="content" type="url" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="QR content URL" placeholder="https://your-link" />
      <button class="btn" id="toggle">flatten to QR</button>
      <div class="menu-wrap">
        <button class="btn" id="saveBtn" aria-haspopup="true" aria-expanded="false">save ▾</button>
        <div class="menu" id="saveMenu" role="menu" aria-label="save as">
          <button data-act="png" role="menuitem">save QR <span class="meta">PNG</span></button>
          <button data-act="mp4" role="menuitem">save loop <span class="meta">video</span></button>
          <button data-act="gif" role="menuitem">save loop <span class="meta">GIF</span></button>
        </div>
      </div>
    </div>
  </div>

  <div id="recOverlay"><div id="recBar"><i></i></div></div>

  <script type="importmap">
  { "imports": { "three": "https://esm.sh/three@0.160.0" } }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import QRCode from 'https://esm.sh/qrcode@1.5.3'

    const CUBE = 1
    const DEFAULT_CONTENT = 'https://pynzhern.com'

    // ======================================================================
    // shared QR helper — only LUMINANCE is read by scanners, so any hue works
    // as a module as long as dark stays dark and light stays light.
    // ======================================================================
    function qrMatrix(content, opts) {
      let data
      try { data = QRCode.create(content || DEFAULT_CONTENT, opts) }
      catch (e) { data = QRCode.create(content || DEFAULT_CONTENT, { errorCorrectionLevel: opts.errorCorrectionLevel }) }
      const size = data.modules.size
      const matrix = []
      for (let y = 0; y < size; y++) {
        const row = []
        for (let x = 0; x < size; x++) row.push(data.modules.get(x, y) === 1)
        matrix.push(row)
      }
      return matrix
    }

    // ======================================================================
    // CALADIUM — climbing golden-angle spiral of heart leaves. Every leaf cell
    // is coloured by the module beneath it: exposed tops carry the real QR, the
    // rest is a matching "mock" mottle so the whole plant reads as one variegated
    // thing. Leaves are scaled (never clipped) to fan out to the square edge.
    // ======================================================================
    const CAL = (() => {
      const CREAM = '#f3e7ea'
      const FLOOR_DARK = '#566159'
      const CREAM_C = new THREE.Color(CREAM)
      const FLOOR_DARK_C = new THREE.Color(FLOOR_DARK)
      const STALK_DARK = new THREE.Color('#587a3f')
      const GREEN_PALE = new THREE.Color('#d2e2cd')
      // unified variegation: midrib → blade → vein → green band → margin, on every leaf
      const ZD = { midrib: new THREE.Color('#8a2f54'), blade: new THREE.Color('#b34d72'), vein: new THREE.Color('#b3607f'), gband: new THREE.Color('#4f7a3a'), margin: new THREE.Color('#3f6e34') } // dark module
      const ZL = { midrib: new THREE.Color('#d886ad'), blade: new THREE.Color('#e6a8c6'), vein: new THREE.Color('#eccfe0'), gband: new THREE.Color('#b6d2a4'), margin: new THREE.Color('#a4c197') } // light module
      const ZN = { midrib: new THREE.Color('#9c3d63'), blade: new THREE.Color('#c9608a'), vein: new THREE.Color('#f3e6ec'), gband: new THREE.Color('#5f8f48'), margin: new THREE.Color('#3f6e34') } // occluded
      const POT_R = 8.5, POT_H = 11
      const POT_BODY = new THREE.Color('#c0744d')
      const POT_RIM = new THREE.Color('#d98f63')
      const POT_SOIL = new THREE.Color('#4f3b2a')

      function pseudoRandom(a, b, seed) { const s = Math.sin(a * 127.1 + b * 311.7 + seed * 43.7) * 43758.5; return s - Math.floor(s) }
      function frac(x) { return x - Math.floor(x) }
      function heart(u, v) { const x = u * 1.2, y = 1.2 - v * 2.4; const a = x * x + y * y - 1; return a * a * a - x * x * y * y * y <= 0 }
      function leafZone(u, v, e1, e2) {
        if (e1 || e2) return 'margin'
        const t = Math.abs(u)
        if (t < 0.07) return 'midrib'
        if (t > 0.68) return 'gband'
        if (frac(t * 4 - v * 1.6) < 0.09) return 'vein'
        return 'blade'
      }
      function pushCell(onOut, offOut, col, row, H, offset, zone, gridSize) {
        const onTile = col >= 0 && row >= 0 && col < gridSize && row < gridSize
        if (onTile) onOut.push({ col, row, H, zone })
        else offOut.push({ x: col - offset, y: H, z: row - offset, color: ZN[zone] })
      }
      function pushStalk(onOut, offOut, wx, wy, wz, matrix, offset, gridSize) {
        const col = Math.round(wx + offset), row = Math.round(wz + offset)
        const onTile = col >= 0 && row >= 0 && col < gridSize && row < gridSize
        if (onTile) onOut.push({ col, row, H: wy, color: matrix[row][col] ? STALK_DARK : GREEN_PALE, fixed: true })
        else offOut.push({ x: col - offset, y: wy, z: row - offset, color: GREEN_PALE })
      }
      function buildLeaf(onOut, offOut, leaf, matrix, offset, gridSize, potH) {
        const { cx, cz, az, size, baseH, rise, droop, cup } = leaf
        const ca = Math.cos(az), sa = Math.sin(az)
        const du = 1 / size, dv = 1 / (size * 1.7)
        const ext = Math.ceil(size * 2.4)
        const ccol = Math.round(cx + offset), crow = Math.round(cz + offset)
        let lmaxY = baseH
        const sSteps = Math.ceil(Math.hypot(cx, cz) + Math.abs(baseH - potH)) + 1
        for (let s = 0; s <= sSteps; s++) {
          const f = s / sSteps
          pushStalk(onOut, offOut, cx * f, potH + (baseH - potH) * f, cz * f, matrix, offset, gridSize)
        }
        for (let col = ccol - ext; col <= ccol + ext; col++) {
          for (let row = crow - ext; row <= crow + ext; row++) {
            const dx = (col - offset) - cx, dz = (row - offset) - cz
            const lz = dx * ca + dz * sa, lx = -dx * sa + dz * ca
            const u = lx / size, v = lz / (size * 1.7)
            if (v < 0 || v > 1 || u < -1 || u > 1) continue
            if (!heart(u, v)) continue
            const e1 = !heart(u + du, v) || !heart(u - du, v) || !heart(u, v + dv) || !heart(u, v - dv)
            const e2 = !heart(u + 2 * du, v) || !heart(u - 2 * du, v) || !heart(u, v + 2 * dv) || !heart(u, v - 2 * dv)
            const zone = leafZone(u, v, e1, e2)
            const H = baseH + v * rise - droop * v * v - cup * u * u
            pushCell(onOut, offOut, col, row, Math.max(potH, H), offset, zone, gridSize)
            if (H > lmaxY) lmaxY = H
          }
        }
        return lmaxY
      }
      function buildPot(out, potR, potH) {
        for (let ly = 0; ly < potH; ly++) {
          const rOut = potR * (0.7 + 0.3 * ly / (potH - 1))
          const rIn = rOut - 1.6
          const rim = ly === potH - 1
          const m = Math.ceil(potR)
          for (let x = -m; x <= m; x++) for (let z = -m; z <= m; z++) {
            const d = Math.hypot(x, z)
            if (d <= rOut && d >= rIn) out.push({ x, y: ly, z, color: rim ? POT_RIM : POT_BODY })
          }
        }
        // soil a layer below the rim → visible terracotta lip, filled up to the wall so there's no see-through
        const mf = Math.ceil(potR)
        const soilTop = potH - 2
        for (let ly = soilTop; ly >= Math.max(0, soilTop - 2); ly--) {
          const rFill = potR * (0.7 + 0.3 * ly / (potH - 1)) - 1.1
          for (let x = -mf; x <= mf; x++) for (let z = -mf; z <= mf; z++) {
            if (Math.hypot(x, z) <= rFill) out.push({ x, y: ly, z, color: POT_SOIL })
          }
        }
      }

      function build(content, ec) {
        const opts = ec === 'H' ? { errorCorrectionLevel: 'H', version: 9 } : { errorCorrectionLevel: 'M' }
        const matrix = qrMatrix(content, opts)
        const gridSize = matrix.length
        const offset = (gridSize - 1) / 2

        const groundCells = []
        let dark = 0, total = 0
        for (let row = 0; row < gridSize; row++) for (let col = 0; col < gridSize; col++) {
          const isDark = matrix[row][col]; total++; if (isDark) dark++
          groundCells.push({ x: col - offset, y: 0, z: row - offset, color: isDark ? FLOOR_DARK_C : CREAM_C })
        }

        const sc = gridSize / 33
        const potR = POT_R * sc, potH = Math.max(4, Math.round(POT_H * sc))
        const potCells = []
        buildPot(potCells, potR, potH)

        const leaves = [], overhang = []
        const N = Math.max(9, Math.min(12, 9 + Math.round((dark / total) * 3)))
        const GOLDEN = 2.39996323
        const MAX_TILT = 1.4

        const defs = []
        for (let k = 0; k < N; k++) {
          const qrBit = matrix[(k * 7) % gridSize][(k * 13) % gridSize] ? 1 : 0
          const r2 = pseudoRandom(k, 2, qrBit + 3), r3 = pseudoRandom(k, 5, qrBit + 7)
          const r4 = pseudoRandom(k, 8, qrBit + 2), r5 = pseudoRandom(k, 11, qrBit + 9), r6 = pseudoRandom(k, 13, qrBit)
          const t = N > 1 ? k / (N - 1) : 0
          defs.push({
            az: k * GOLDEN, rc: (0.9 + r3 * 1.7) * sc, climbH: (3 + t * 30 + r5 * 3) * sc,
            size: (9 + t * 2.5 + r2 * 3) * sc, rise: (8 + r6 * 5) * sc, droop: (3 + r4 * 3) * sc, cup: (3 + r3 * 2.5) * sc
          })
        }
        // per-leaf fit: grow each leaf to the SQUARE edge in its own direction (no overhang, fans to corners)
        const S = gridSize * 0.5 - 0.3
        let maxY = 0, maxR = 0
        for (const d of defs) {
          const cA = Math.abs(Math.cos(d.az)), sA = Math.abs(Math.sin(d.az))
          const reach = d.rc + d.size * 1.7, lat = d.size * 0.85
          const bx = reach * cA + lat * sA, bz = reach * sA + lat * cA
          const f = Math.min(2, S / Math.max(bx, bz))
          const rc = d.rc * f, size = d.size * f
          const baseH = potH + Math.max(d.climbH, rc / MAX_TILT)
          const leaf = { cx: Math.cos(d.az) * rc, cz: Math.sin(d.az) * rc, az: d.az, size, baseH, rise: d.rise, droop: d.droop, cup: d.cup * f }
          const ly = buildLeaf(leaves, overhang, leaf, matrix, offset, gridSize, potH)
          if (ly > maxY) maxY = ly
          const rr = rc + size * 1.7; if (rr > maxR) maxR = rr
        }
        if (potR > maxR) maxR = potR

        // colour every on-tile leaf cell by its module → exposed tops = real QR, the rest = matching mottle
        const leafCells = []
        for (const v of leaves) {
          const color = v.fixed ? v.color : (matrix[v.row][v.col] ? ZD[v.zone] : ZL[v.zone])
          leafCells.push({ x: v.col - offset, y: v.H, z: v.row - offset, color })
        }

        return {
          groups: [
            { cells: groundCells, fade: false, sway: false },
            { cells: potCells, fade: true, sway: false },
            { cells: leafCells, fade: false, sway: true },
            { cells: overhang, fade: true, sway: true }
          ],
          view: { span: gridSize, maxR, maxY, spanK: 0.6, radK: 0.82, heightK: 0.55, focusK: 0.4 }
        }
      }
      return { build }
    })()

    // ======================================================================
    // PINE — tiered notched fir. The body is dark green; only the exposed top
    // needle of each cell is coloured by its module, so the canopy carries the
    // QR and (in snow) the white lands only on the upward tops = snow resting ON
    // the tree. forest / snow swap palette + ground.
    // ======================================================================
    const PINE = (() => {
      const TRUNK_RADIUS = 2.5, TRUNK_LAYERS = 11, TIERS = 4, LAYERS_PER_TIER = 7, OUTER_FACTOR = 0.46
      const GROUND = {
        forest: { dark: new THREE.Color('#3f3020'), light: new THREE.Color('#c2a878') },
        snow:   { dark: new THREE.Color('#7a858c'), light: new THREE.Color('#eef3f6') }
      }
      const TRUNK = { forest: new THREE.Color('#5e4329'), snow: new THREE.Color('#5a4636') }
      const PAL = {
        forest: { dark: new THREE.Color('#244f29'), pale: new THREE.Color('#a6c96a') },
        snow:   { dark: new THREE.Color('#2f5a37'), pale: new THREE.Color('#eef3f4') }
      }
      function canopyTiered(d, outer) {
        const total = TIERS * LAYERS_PER_TIER, out = []
        for (let L = 0; L < total; L++) {
          const tier = Math.floor(L / LAYERS_PER_TIER)
          const p = (L - tier * LAYERS_PER_TIER) / LAYERS_PER_TIER
          const taper = tier === TIERS - 1 ? 0.12 : 0.46
          const r = outer * (1 - tier * 0.20) * (1 - p * (1 - taper))
          if (d <= r) out.push(L)
        }
        return out
      }
      function build(content, variant) {
        const matrix = qrMatrix(content, { errorCorrectionLevel: 'M' })
        const gridSize = matrix.length
        const cx = (gridSize - 1) / 2, cy = (gridSize - 1) / 2
        const offset = (gridSize - 1) / 2
        const outer = gridSize * OUTER_FACTOR
        const canopyBase = TRUNK_LAYERS * CUBE
        const G = GROUND[variant], TR = TRUNK[variant], P = PAL[variant]

        const groundCells = []
        for (let row = 0; row < gridSize; row++) for (let col = 0; col < gridSize; col++)
          groundCells.push({ x: col - offset, y: 0, z: row - offset, color: matrix[row][col] ? G.dark : G.light })

        const trunkCells = []
        for (let row = 0; row < gridSize; row++) for (let col = 0; col < gridSize; col++) {
          if (Math.hypot(col - cx, row - cy) >= TRUNK_RADIUS) continue
          for (let L = 0; L < TRUNK_LAYERS; L++) trunkCells.push({ x: col - offset, y: L * CUBE, z: row - offset, color: TR })
        }

        const canopy = []
        for (let row = 0; row < gridSize; row++) for (let col = 0; col < gridSize; col++) {
          const d = Math.hypot(col - cx, row - cy)
          if (d >= outer) continue
          const layers = canopyTiered(d, outer)
          if (!layers.length) continue
          for (const L of layers) canopy.push({ col, row, baseY: canopyBase + L * CUBE })
        }
        const cellTop = new Map()
        for (const v of canopy) { const k = v.col * 4096 + v.row; const m = cellTop.get(k); if (m === undefined || v.baseY > m) cellTop.set(k, v.baseY) }
        const canopyCells = []
        for (const v of canopy) {
          const top = v.baseY >= cellTop.get(v.col * 4096 + v.row) - 0.001
          const dark = matrix[v.row][v.col]
          canopyCells.push({ x: v.col - offset, y: v.baseY, z: v.row - offset, color: top ? (dark ? P.dark : P.pale) : P.dark })
        }

        const totalHeight = TRUNK_LAYERS + TIERS * LAYERS_PER_TIER
        return {
          groups: [
            { cells: groundCells, fade: false, sway: false },
            { cells: trunkCells, fade: true, sway: false },
            { cells: canopyCells, fade: false, sway: true }
          ],
          view: { span: gridSize, maxR: 0, maxY: totalHeight, spanK: 0.64, radK: 0, heightK: 0.52, focusK: 0.42 }
        }
      }
      return { build }
    })()

    // ======================================================================
    // model registry
    // ======================================================================
    const MODELS = {
      'caladium-h': { accent: '#c24d77', bg: '#f7f1f3', grow: 'grow caladium', seasons: false, build: c => CAL.build(c, 'H') },
      'caladium-m': { accent: '#c24d77', bg: '#f7f1f3', grow: 'grow caladium', seasons: false, build: c => CAL.build(c, 'M') },
      'pine':       { accent: '#4a7c4e', bg: '#f2f5f2', grow: 'grow pine',     seasons: true,  build: (c, v) => PINE.build(c, v) }
    }

    // ======================================================================
    // scene — one renderer / camera / loop for every model
    // ======================================================================
    const app = document.getElementById('app')
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.outputColorSpace = THREE.SRGBColorSpace
    app.appendChild(renderer.domElement)

    const scene = new THREE.Scene()
    scene.background = new THREE.Color(MODELS['caladium-h'].bg)
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 8000) // ortho keeps lifted voxels on their footprint top-down
    scene.add(new THREE.HemisphereLight(0xffffff, 0xa6a8a6, 1.02))
    const sun = new THREE.DirectionalLight(0xffffff, 1.18)
    sun.position.set(-11, 29, 11)
    scene.add(sun)

    const cubeGeo = new THREE.BoxGeometry(CUBE, CUBE, CUBE)
    const solidMat = new THREE.MeshStandardMaterial({ roughness: 0.88, flatShading: true })          // ground + the plant body (the QR)
    const fadeMat = new THREE.MeshStandardMaterial({ roughness: 0.9, flatShading: true, transparent: true, opacity: 1 }) // pot/trunk/overhang — fade when flat
    const obj = new THREE.Object3D()

    let meshes = []          // { mesh, sway }
    let view = null
    let currentModel = 'caladium-h'
    let variant = 'forest'

    function makeMesh(cells, mat) {
      const mesh = new THREE.InstancedMesh(cubeGeo, mat, cells.length)
      for (let i = 0; i < cells.length; i++) {
        const b = cells[i]
        obj.position.set(b.x, b.y + CUBE / 2, b.z)
        obj.updateMatrix(); mesh.setMatrixAt(i, obj.matrix)
        mesh.setColorAt(i, b.color)
      }
      mesh.instanceMatrix.needsUpdate = true
      if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true
      return mesh
    }

    function rebuild() {
      const data = MODELS[currentModel].build(input.value || DEFAULT_CONTENT, variant)
      view = data.view
      for (const m of meshes) { scene.remove(m.mesh); m.mesh.dispose() }
      meshes = []
      for (const g of data.groups) {
        if (!g.cells.length) continue
        const mesh = makeMesh(g.cells, g.fade ? fadeMat : solidMat)
        scene.add(mesh); meshes.push({ mesh, sway: g.sway })
      }
    }

    // ---- camera: flat ↔ iso morph + drag orbit ----------------------------
    let t = 0, target = 1
    let az = 0.7, el = 0.61
    let exporting = false
    const pos = new THREE.Vector3(), tgt = new THREE.Vector3(), dir = new THREE.Vector3(), up = new THREE.Vector3()
    const UP_FLAT = new THREE.Vector3(0, 0, -1), UP_ISO = new THREE.Vector3(0, 1, 0)
    function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2 }
    function fadeOpacity(e) { return 1 } // top-down is an honest projection of the 3D: pot/trunk/overhang always present, no fade/morph

    // place an ortho camera for a grow amount e (0 flat → 1 iso), azimuth and viewport aspect.
    // shared by the live loop and the export renderer so what you record matches what you see.
    function applyCamera(cam, e, azv, aspect) {
      const span = view.span
      // +4 modules of quiet zone on the tight axis so coarse (level-M) codes still anchor their finders
      const flatHalf = Math.max(span * 0.5 + 4, span / (2 * aspect)) * 1.06
      const isoHalf = Math.max(span * view.spanK, view.maxR * view.radK, view.maxY * view.heightK) * 1.1
      const halfH = flatHalf + (isoHalf - flatHalf) * e
      cam.top = halfH; cam.bottom = -halfH; cam.left = -halfH * aspect; cam.right = halfH * aspect
      cam.updateProjectionMatrix()
      const elNow = (Math.PI / 2) * (1 - e) + el * e
      const azNow = azv * e
      dir.set(Math.cos(elNow) * Math.sin(azNow), Math.sin(elNow), Math.cos(elNow) * Math.cos(azNow))
      up.copy(UP_FLAT).lerp(UP_ISO, e).normalize()
      tgt.set(0, view.maxY * view.focusK * e, 0)
      pos.copy(dir).multiplyScalar(span * 6).add(tgt)
      cam.position.copy(pos); cam.up.copy(up); cam.lookAt(tgt)
    }

    function frame(now) {
      if (exporting) { requestAnimationFrame(frame); return } // export drives the scene; pause the live loop
      t += (target - t) * 0.10
      if (Math.abs(target - t) < 0.0004) t = target
      const e = easeInOut(t)
      applyCamera(camera, e, az, window.innerWidth / window.innerHeight)
      // fade material fades to nothing when flat → clean square QR; sway × e → 0 at rest so the match holds
      fadeMat.opacity = fadeOpacity(e)
      const tm = now / 1000
      const sz = Math.sin(tm * 1.0) * 0.012 * e, sx = Math.cos(tm * 0.8) * 0.008 * e
      for (const m of meshes) if (m.sway) { m.mesh.rotation.z = sz; m.mesh.rotation.x = sx }
      renderer.render(scene, camera)
      requestAnimationFrame(frame)
    }

    // ---- interaction ------------------------------------------------------
    const btn = document.getElementById('toggle')
    const input = document.getElementById('content')
    const plantSeg = document.getElementById('plantSeg')
    const loading = document.getElementById('loading')
    input.value = DEFAULT_CONTENT

    function toggle() {
      target = target === 0 ? 1 : 0
      if (target === 0) az = Math.atan2(Math.sin(az), Math.cos(az)) // un-spin the shortest way back to top-down
      btn.textContent = target === 1 ? 'flatten to QR' : MODELS[currentModel].grow
    }
    btn.addEventListener('click', toggle)

    let dragging = false, lastX = 0, lastY = 0, moved = 0
    const cv = renderer.domElement
    cv.addEventListener('pointerdown', ev => { dragging = true; lastX = ev.clientX; lastY = ev.clientY; moved = 0; cv.setPointerCapture(ev.pointerId) })
    cv.addEventListener('pointermove', ev => {
      if (!dragging) return
      const dx = ev.clientX - lastX, dy = ev.clientY - lastY
      lastX = ev.clientX; lastY = ev.clientY; moved += Math.abs(dx) + Math.abs(dy)
      az -= dx * 0.006
      el = Math.max(0.2, Math.min(1.45, el + dy * 0.005))
    })
    cv.addEventListener('pointerup', () => { dragging = false; if (moved < 6) toggle() })

    function applyTheme(m) {
      const root = document.documentElement.style
      root.setProperty('--accent', m.accent)
      root.setProperty('--bg', m.bg)
      scene.background.set(m.bg)
      document.querySelector('meta[name=theme-color]').setAttribute('content', m.bg)
    }

    // one row, four presets: caladium fine/bold (error-correction H/M) and pine forest/snow.
    // each button carries its model and (for pine) its season; season is irrelevant to caladium.
    plantSeg.addEventListener('click', ev => {
      const b = ev.target.closest('button'); if (!b) return
      currentModel = b.dataset.model
      if (b.dataset.season) variant = b.dataset.season
      const m = MODELS[currentModel]
      plantSeg.querySelectorAll('button').forEach(x => { const on = x === b; x.classList.toggle('on', on); x.setAttribute('aria-pressed', on) })
      applyTheme(m)
      btn.textContent = target === 1 ? 'flatten to QR' : m.grow
      rebuild()
    })

    const logoImg = new Image(); logoImg.src = PZ_LOGO
    const pageMark = document.getElementById('pageMark'); if (pageMark) pageMark.src = PZ_LOGO // on-page signature reuses the embedded logo

    function ensureExport() {
      if (exportRenderer) return
      exportRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true })
      exportRenderer.setPixelRatio(1)
      exportRenderer.setSize(EXPORT_SIZE, EXPORT_SIZE, false)
      exportRenderer.outputColorSpace = THREE.SRGBColorSpace
      exportCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 8000)
      // a 2D compositor is the on-screen, captured surface: it boosts contrast on the flat (scannable) frames
      // so coarse level-M codes still decode, while the 3D orbit stays natural. captureStream reads it.
      compositor = document.createElement('canvas'); compositor.width = EXPORT_SIZE; compositor.height = EXPORT_SIZE + FOOTER_H
      compCtx = compositor.getContext('2d')
      recOverlay.insertBefore(compositor, recBar)
    }
    function clearSway() { for (const m of meshes) { m.mesh.rotation.z = 0; m.mesh.rotation.x = 0 } }
    function download(href, name) { const a = document.createElement('a'); a.href = href; a.download = name; document.body.appendChild(a); a.click(); a.remove() }

    // embed authorship as PNG tEXt chunks (invisible, but provable) — inserted right after IHDR
    const CRC_TABLE = (() => { const t = new Uint32Array(256); for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0 } return t })()
    function crc32(b) { let c = 0xFFFFFFFF; for (let i = 0; i < b.length; i++) c = CRC_TABLE[(c ^ b[i]) & 0xFF] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0 }
    function textChunk(keyword, text) {
      const body = []
      for (let i = 0; i < keyword.length; i++) body.push(keyword.charCodeAt(i) & 0xFF)
      body.push(0)
      for (let i = 0; i < text.length; i++) body.push(text.charCodeAt(i) & 0xFF)
      const type = [116, 69, 88, 116] // 'tEXt'
      const typed = new Uint8Array(type.concat(body))      // crc covers type + data
      const out = new Uint8Array(12 + body.length)
      const dv = new DataView(out.buffer)
      dv.setUint32(0, body.length); out.set(type, 4); out.set(body, 8); dv.setUint32(8 + body.length, crc32(typed))
      return out
    }
    function pngWithText(dataURL, fields) {
      const bin = atob(dataURL.split(',')[1]); const png = new Uint8Array(bin.length)
      for (let i = 0; i < bin.length; i++) png[i] = bin.charCodeAt(i)
      const at = 33 // 8 sig + IHDR(4 len + 4 type + 13 data + 4 crc)
      const chunks = Object.entries(fields).map(([k, v]) => textChunk(k, v))
      const extra = chunks.reduce((n, c) => n + c.length, 0)
      const out = new Uint8Array(png.length + extra)
      out.set(png.subarray(0, at), 0)
      let off = at
      for (const c of chunks) { out.set(c, off); off += c.length }
      out.set(png.subarray(at), off)
      return new Blob([out], { type: 'image/png' })
    }
    // filenames read plant · qr · site, e.g. caladium-h-qr-pynzhern-com-loop.gif
    function exportSlug() {
      let s = (input.value || DEFAULT_CONTENT).trim().replace(/^https?:\/\//i, '').replace(/^www\./i, '')
      s = s.replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '').toLowerCase()
      return s.slice(0, 40) || 'qr'
    }
    function exportTag() { return currentModel === 'pine' ? `pine-${variant}` : currentModel }
    function exportName(suffix, ext) { return `${exportTag()}-qr-${exportSlug()}${suffix}.${ext}` }
    // render one export frame (square, no HUD) into the compositor; contrast is full at flat (e=0), none in iso (e=1)
    // only the low-contrast designs need a contrast lift to stay scannable as a standalone image; the rest
    // export exactly as shown on screen. boost applies at flat (e=0) and ramps to none by iso (e=1).
    function exportBoost() {
      if (currentModel === 'pine') return variant === 'snow' ? 2.0 : 1.0 // snow + the footer logo is the worst case
      if (currentModel === 'caladium-m') return 1.5
      return 1.0 // caladium-h, pine forest — scan raw, no boost → saved == on-screen
    }
    function renderExportFrame(e, azv, kOverride) {
      ensureExport(); clearSway()
      fadeMat.opacity = fadeOpacity(e)
      applyCamera(exportCamera, e, azv, 1)
      exportRenderer.render(scene, exportCamera)
      const K = kOverride != null ? kOverride : 1 + (exportBoost() - 1) * (1 - Math.max(0, Math.min(1, e)))
      compCtx.clearRect(0, 0, compositor.width, compositor.height)
      compCtx.filter = `contrast(${Math.round(K * 100)}%)`
      compCtx.drawImage(exportRenderer.domElement, 0, 0, EXPORT_SIZE, EXPORT_SIZE) // the code (square)
      compCtx.filter = 'none'
      // footer: match it to the (boosted) quiet-zone colour so there's no seam, then drop the signature in
      const q = compCtx.getImageData(6, 6, 1, 1).data
      compCtx.fillStyle = `rgb(${q[0]},${q[1]},${q[2]})`
      compCtx.fillRect(0, EXPORT_SIZE, compositor.width, FOOTER_H)
      if (logoImg.complete && logoImg.naturalWidth) {
        const lw = EXPORT_SIZE * 0.19, lh = lw * (logoImg.naturalHeight / logoImg.naturalWidth)
        compCtx.globalAlpha = 0.72
        compCtx.drawImage(logoImg, (EXPORT_SIZE - lw) / 2, EXPORT_SIZE + (FOOTER_H - lh) / 2, lw, lh)
        compCtx.globalAlpha = 1
      }
    }

    function savePng() {
      renderExportFrame(0, 0) // flat top-down → the scannable still
      const blob = pngWithText(compositor.toDataURL('image/png'), {
        Copyright: '(c) Khoo Pyn Zhern, pynzhern.com'
      })
      const url = URL.createObjectURL(blob)
      download(url, exportName('', 'png'))
      setTimeout(() => URL.revokeObjectURL(url), 5000)
    }

    // capture timeline: hold flat → grow → hold grown → ease a full 360° spin → hold grown → flatten → hold flat.
    // the spin eases in and out of rest (no abrupt start/stop) and is bracketed by short stills, so the loop
    // breathes instead of snapping into the orbit. the longer flat holds also give the video a clear cover frame.
    // endpoints are the identical flat frame and the spin lands back at az 0 (≡ 2π), so the clip still loops
    // seamlessly with no extra un-spin on the flatten.
    const EXP = { holdA: 0.5, grow: 1.1, holdGrownIn: 0.4, orbit: 3.4, holdGrownOut: 0.4, flat: 1.1, holdB: 0.5 }
    const EXP_DUR = EXP.holdA + EXP.grow + EXP.holdGrownIn + EXP.orbit + EXP.holdGrownOut + EXP.flat + EXP.holdB
    function exportState(s) {
      if (s < EXP.holdA) return [0, 0]; s -= EXP.holdA
      if (s < EXP.grow) return [easeInOut(s / EXP.grow), 0]; s -= EXP.grow
      if (s < EXP.holdGrownIn) return [1, 0]; s -= EXP.holdGrownIn       // rest, fully grown, before the spin
      if (s < EXP.orbit) return [1, 2 * Math.PI * easeInOut(s / EXP.orbit)]; s -= EXP.orbit  // eased spin: rest → 360° → rest
      if (s < EXP.holdGrownOut) return [1, 0]; s -= EXP.holdGrownOut     // rest, fully grown, after the spin (az 2π ≡ 0)
      if (s < EXP.flat) return [easeInOut(1 - s / EXP.flat), 0]          // az = 0 here, NOT 2π → clean tilt-down, no spin
      return [0, 0]
    }
    function pickMime() {
      const c = ['video/mp4;codecs=avc1.42E01E', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4']
      for (const t of c) if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t
      return ''
    }
    const canRecord = typeof HTMLCanvasElement.prototype.captureStream === 'function' && !!window.MediaRecorder && !!pickMime()
    const mp4Item = saveMenu.querySelector('[data-act="mp4"]')
    if (!canRecord) { mp4Item.disabled = true; mp4Item.title = 'video capture is not supported in this browser' }

    function setBusy(on, label) {
      saveBtn.disabled = on; btn.disabled = on
      plantSeg.querySelectorAll('button').forEach(b => b.disabled = on)
      if (on) closeMenu()
      // recording/encoding status is shown by the progress bar, not text
    }

    function recordLoop() {
      if (!canRecord) return
      ensureExport(); clearSway()
      exporting = true; recOverlay.classList.add('on'); setBusy(true); setProg(0)
      const mime = pickMime()
      const stream = compositor.captureStream(60)
      const chunks = []
      const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 })
      rec.ondataavailable = ev => { if (ev.data && ev.data.size) chunks.push(ev.data) }
      // paint the flat QR before capture begins so the video's first/cover frame is the
      // scannable code, not a stale or blank compositor frame
      renderExportFrame(0, 0)
      rec.onstop = () => {
        const blob = new Blob(chunks, { type: mime })
        const ext = mime.includes('mp4') ? 'mp4' : 'webm'
        const url = URL.createObjectURL(blob)
        download(url, exportName('-loop', ext))
        setTimeout(() => URL.revokeObjectURL(url), 5000)
        recOverlay.classList.remove('on'); exporting = false; setBusy(false)
      }
      rec.start()
      const start = performance.now()
      function step(now) {
        const s = (now - start) / 1000
        const [e, azv] = exportState(Math.min(s, EXP_DUR))
        renderExportFrame(e, azv)
        setProg(s / EXP_DUR)
        if (s < EXP_DUR) requestAnimationFrame(step)
        else rec.stop()
      }
      requestAnimationFrame(step)
    }

    // ---- GIF export: same loop, encoded client-side (loops inline everywhere a video won't) ----
    const GIF_SIZE = 480, GIF_FPS = 24 // 24 = cinematic standard: smooth to the eye, lighter than 30 to encode/download
    const GIF_H = Math.round(GIF_SIZE * (EXPORT_SIZE + FOOTER_H) / EXPORT_SIZE)
    let GIFlib = null, gifWorkerURL = null, gifScratch = null, gifScratchCtx = null
    async function ensureGifLib() {
      if (GIFlib) return
      if (!window.GIF) {
        await new Promise((res, rej) => {
          const s = document.createElement('script')
          s.src = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js'
          s.onload = res; s.onerror = () => rej(new Error('gif.js load failed'))
          document.head.appendChild(s)
        })
      }
      GIFlib = window.GIF
      const resp = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js') // blob worker → no cross-origin worker error
      gifWorkerURL = URL.createObjectURL(await resp.blob())
    }
    async function saveGif() {
      ensureExport(); clearSway()
      exporting = true; recOverlay.classList.add('on'); setBusy(true); recBar.classList.add('indet')
      try { await ensureGifLib() }
      catch (e) { recOverlay.classList.remove('on'); exporting = false; setBusy(false); alert('could not load the gif encoder (offline?)'); return }
      if (!gifScratch) { gifScratch = document.createElement('canvas'); gifScratch.width = GIF_SIZE; gifScratch.height = GIF_H; gifScratchCtx = gifScratch.getContext('2d') }
      const gif = new GIFlib({ workers: 4, quality: 8, width: GIF_SIZE, height: GIF_H, workerScript: gifWorkerURL, repeat: 0 })
      const frames = Math.round(EXP_DUR * GIF_FPS)
      for (let i = 0; i < frames; i++) {
        const [e, azv] = exportState(Math.min(i / GIF_FPS, EXP_DUR))
        renderExportFrame(e, azv)
        gifScratchCtx.clearRect(0, 0, GIF_SIZE, GIF_H)
        gifScratchCtx.drawImage(compositor, 0, 0, GIF_SIZE, GIF_H)
        gif.addFrame(gifScratchCtx, { copy: true, delay: Math.round(1000 / GIF_FPS) })
        // yield every frame so the capture overlay repaints smoothly (matches the mp4 preview),
        // not every 4th (which looked choppy on screen even though the saved file was fine)
        setProg(0.5 * i / frames)
        await new Promise(r => requestAnimationFrame(r))
      }
      gif.on('progress', p => setProg(0.5 + 0.5 * p))
      gif.on('finished', blob => {
        download(URL.createObjectURL(blob), exportName('-loop', 'gif'))
        recOverlay.classList.remove('on'); exporting = false; setBusy(false)
      })
      gif.render()
    }

    // ---- about popover + save menu ----
    const aboutBtn = document.getElementById('aboutBtn')
    const aboutCard = document.getElementById('aboutCard')
    function closeMenu() { saveMenu.classList.remove('open'); saveBtn.setAttribute('aria-expanded', 'false') }
    saveBtn.addEventListener('click', ev => {
      ev.stopPropagation()
      const open = saveMenu.classList.toggle('open'); saveBtn.setAttribute('aria-expanded', String(open))
      aboutCard.classList.remove('open')
    })
    saveMenu.addEventListener('click', ev => {
      ev.stopPropagation()
      const b = ev.target.closest('button'); if (!b || b.disabled) return
      closeMenu()
      const act = b.dataset.act
      if (act === 'png') savePng(); else if (act === 'mp4') recordLoop(); else if (act === 'gif') saveGif()
    })
    aboutBtn.addEventListener('click', ev => {
      ev.stopPropagation()
      const open = aboutCard.classList.toggle('open'); aboutBtn.setAttribute('aria-expanded', String(open))
      closeMenu()
    })
    aboutCard.addEventListener('click', ev => ev.stopPropagation())
    document.addEventListener('click', () => { closeMenu(); aboutCard.classList.remove('open') })
    document.addEventListener('keydown', ev => { if (ev.key === 'Escape') { closeMenu(); aboutCard.classList.remove('open') } })

    // small hook for embedding / testing: grab a square frame as a PNG data URL (k overrides the contrast boost)
    window.qrBotanical = { frame: (e, azv, k) => { renderExportFrame(e || 0, azv || 0, k); return compositor.toDataURL('image/png') } }

    let debounce = null
    input.addEventListener('input', () => { clearTimeout(debounce); debounce = setTimeout(rebuild, 250) })
    window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight))

    rebuild()
    loading.classList.add('gone')
    setTimeout(() => loading.remove(), 500)
    requestAnimationFrame(frame)
  </script>
</body>
</html>
