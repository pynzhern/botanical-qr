<!doctype html>
<html><head><meta charset="utf-8"><title>decode grid</title></head>
<body style="font-family:monospace;background:#111;color:#0f0;padding:12px;white-space:pre-wrap;font-size:12px">
<div id="out">building…</div><div id="frames" style="position:fixed;left:-9999px"></div>
<script type="module">
import jsQR from 'https://esm.sh/jsqr@1.4.0'
const qp = new URLSearchParams(location.search)
const ver = qp.get('ver') || '17'
const file = qp.get('file') || 'frangipani-qr-v38.html'
const CONC = parseInt(qp.get('conc')) || 6
// grid: bloom count × per-bloom size budget
const NFL = (qp.get('nfl') || '5,6,7,8').split(',').map(Number)
const BUD = (qp.get('bud') || '52,60,68,76').split(',').map(Number)
// ~48 diverse URLs (curated hard ones + programmatic) so the grid actually discriminates the aggressive configs
const urls = [
  'https://pynzhern.com','https://www.linkedin.com/in/pynzhern','https://github.com/pynzhern/portfolio',
  'hello@pynzhern.com','https://pynzhern.com/?id=42','mailto:hello@pynzhern.com',
  'https://www.youtube.com/@pynzhern','https://pynzhern.com/projects/botanical-qr?ref=card',
  'https://t.me/pynzhern','https://example.org/a/b/c','https://pynzhern.com/p/12345','https://pynzhern.com/blog/frangipani-qr',
  'https://instagram.com/pynzhern','tel:+6591234567','https://pynzhern.com/cv.pdf','https://medium.com/@pynzhern',
  'https://calendly.com/pynzhern/30min','https://pynzhern.com/?id=7','https://pynzhern.com/feed.xml','https://en.wikipedia.org/wiki/Plumeria'
]
const slugs = ['p','r','u','go','s','n','item','tag']
const NURLS = parseInt(qp.get('n')) || 48
for (let k = 0; urls.length < NURLS; k++) urls.push(`https://pynzhern.com/${slugs[k % slugs.length]}/${(k * 41 + 7).toString(36)}${k % 2 ? '?v=' + (k % 7) : ''}`)
const configs = []
for (const n of NFL) for (const b of BUD) configs.push({ n, b, dead: false, done: 0 })
const tasks = []
for (const c of configs) for (const u of urls) tasks.push({ c, u })
const out = document.getElementById('out'), frames = document.getElementById('frames')
const sleep = ms => new Promise(r => setTimeout(r, ms))
function render() {
  out.textContent = `ver ${ver} · ${configs.length} configs × ${urls.length} urls (conc ${CONC})\n` +
    configs.map(c => `nfl=${c.n} bud=${c.b}: ${c.dead ? 'FAIL ✗' : (c.done === urls.length ? 'PASS ✅' : c.done + '/' + urls.length)}`).join('\n')
}
function runOne(task) {
  return new Promise(res => {
    const { c, u } = task
    if (c.dead) { res(); return }                 // config already excluded → skip instantly
    const f = document.createElement('iframe'); f.width = 280; f.height = 280; f.style.border = '0'
    f.src = `${file}?ver=${ver}&bud=${c.b}&nfl=${c.n}&url=${encodeURIComponent(u)}`
    let settled = false
    const finish = ok => { if (settled) return; settled = true; f.remove(); if (!ok) c.dead = true; else c.done++; render(); res() }
    f.onload = async () => {
      await sleep(1300)
      try {
        const doc = f.contentDocument; doc.getElementById('toggle').click(); await sleep(1300)
        const cv = doc.querySelector('canvas'); const g = document.createElement('canvas'); g.width = cv.width; g.height = cv.height
        g.getContext('2d').drawImage(cv, 0, 0); const img = g.getContext('2d').getImageData(0, 0, g.width, g.height)
        const r = jsQR(img.data, img.width, img.height); finish(!!r && r.data === u)
      } catch (e) { finish(false) }
    }
    frames.appendChild(f)
  })
}
let ti = 0
async function worker() { while (ti < tasks.length) { await runOne(tasks[ti++]) } }
render()
await Promise.all(Array.from({ length: CONC }, () => worker()))
window.__grid = configs.map(c => ({ nfl: c.n, bud: c.b, pass: !c.dead && c.done === urls.length }))
window.__done = true
render()
</script></body></html>
