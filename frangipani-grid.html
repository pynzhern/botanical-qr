<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Frangipani QR — URL stress test</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #e7e9df; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #243024; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr; height: 100%; }
    .cell { position: relative; border: 1px solid rgba(36,48,36,0.12); min-width: 0; min-height: 0; }
    .tag { position: absolute; top: 4px; left: 6px; z-index: 2; font-size: 10px; color: #586253; background: rgba(231,233,223,0.8); padding: 1px 5px; border-radius: 5px; pointer-events: none; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <script>
    const urls = [
      'https://pynzhern.com',
      'https://linkedin.com/in/pynzhern',
      'https://github.com/pynzhern',
      'https://pynzhern.com/projects/botanical-qr',
      'hello world',
      'https://example.org/abc',
      'mailto:hello@pynzhern.com',
      'https://pynzhern.com/p/42'
    ]
    const g = document.getElementById('grid')
    for (const u of urls) {
      const cell = document.createElement('div'); cell.className = 'cell'
      const tag = document.createElement('div'); tag.className = 'tag'; tag.textContent = u.replace(/^https?:\/\//, '').slice(0, 22)
      const f = document.createElement('iframe'); f.src = 'frangipani-qr-v27.html?url=' + encodeURIComponent(u)
      cell.appendChild(tag); cell.appendChild(f); g.appendChild(cell)
    }
  </script>
</body>
</html>
