<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caladium QR — matched</title>
  <style>
    :root { --ink: #3a2030; --muted: #6f5560; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #f6f1f3; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; touch-action: none; }

    .hud { position: fixed; inset: 0; pointer-events: none; padding: 26px;
      display: flex; flex-direction: column; justify-content: space-between; }
    .eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .title { font-size: 24px; font-weight: 650; color: var(--ink); letter-spacing: -0.01em; margin-top: 4px; }
    .sub { font-size: 13px; color: var(--muted); max-width: 36ch; line-height: 1.45; margin-top: 6px; }

    .bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
    .controls { pointer-events: auto; display: flex; gap: 10px; align-items: center; }
    input {
      font: inherit; font-size: 14px; color: var(--ink); background: #fff;
      border: 1px solid rgba(58,32,48,0.16); border-radius: 12px; padding: 10px 14px; width: 220px; outline: none;
    }
    input:focus { border-color: #c24d77; }
    button {
      font: inherit; font-size: 13px; font-weight: 600; color: var(--ink); background: rgba(255,255,255,0.7);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); border: 1px solid rgba(58,32,48,0.14);
      border-radius: 999px; padding: 10px 18px; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #fff; }
    button:active { transform: scale(0.97); }
    .hint { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <div class="top">
      <div class="eyebrow">caladium qr · no overhang (H)</div>
      <div class="title">leaves clipped to the QR square</div>
      <div class="sub">same matched caladium, but every leaf is clipped to the tile — nothing extends past the QR square. edge leaves get trimmed at the boundary. compare against the overhang version.</div>
    </div>
    <div class="bottom">
      <span class="hint">drag to spin · tap to flatten / tilt</span>
      <div class="controls">
        <input id="content" type="url" spellcheck="false" autocomplete="off" autocapitalize="off" />
        <button id="toggle">flatten to QR</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://esm.sh/three@0.160.0" } }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import QRCode from 'https://esm.sh/qrcode@1.5.3'

    const CUBE = 1
    const DEFAULT_CONTENT = 'https://pynzhern.com'

    // QR palette — leaves and ground share it so the top-down is seamless
    const CREAM = '#f3e7ea'
    const FLOOR_DARK = '#566159'   // single monotone floor tone — neutral, lets the leaves carry the colour
    const PINK_GND = '#b34d72'
    const GREEN_GND = '#4f7a3a'
    const BROWN_GND = '#6b4a32'   // dark brown is low-luminance → valid for DARK modules
    const BROWN_DARK = new THREE.Color('#6b4a32')
    const BROWN_PALE = new THREE.Color('#ddcdb4') // pale tan, high-luminance → valid for LIGHT modules
    const PINK_DARK = new THREE.Color('#b34d72')
    const GREEN_DARK = new THREE.Color('#4f7a3a')
    const STALK_DARK = new THREE.Color('#587a3f')
    const PINK_PALE = new THREE.Color('#ecc4d5')   // warm pale-rose (not near-white) → reads as variegation
    const GREEN_PALE = new THREE.Color('#d2e2cd')  // pale sage
    const BG = new THREE.Color('#f6f1f3')
    // organic botanical variegation for the OCCLUDED under-leaves (not the QR — seen only from the side in 3D)
    // unified caladium variegation: the SAME structure on every leaf (midrib → blade → vein → green band →
    // margin). the QR is encoded only as light/dark on the exposed top cells, within that structure.
    const ZD = { midrib: new THREE.Color('#8a2f54'), blade: new THREE.Color('#b34d72'), vein: new THREE.Color('#b3607f'), gband: new THREE.Color('#4f7a3a'), margin: new THREE.Color('#3f6e34') } // dark module
    const ZL = { midrib: new THREE.Color('#e2a8c2'), blade: new THREE.Color('#eec6d6'), vein: new THREE.Color('#f5ebef'), gband: new THREE.Color('#cfe0c8'), margin: new THREE.Color('#bcd0b3') } // light module
    const ZN = { midrib: new THREE.Color('#9c3d63'), blade: new THREE.Color('#c9608a'), vein: new THREE.Color('#f3e6ec'), gband: new THREE.Color('#5f8f48'), margin: new THREE.Color('#3f6e34') } // occluded / natural
    // terracotta pot (fades on flatten so the flat QR centre is the plant, not the pot)
    const POT_R = 6.2, POT_H = 9
    const POT_BODY = new THREE.Color('#c0744d')
    const POT_RIM = new THREE.Color('#d98f63')
    const POT_SOIL = new THREE.Color('#4f3b2a')

    function generateQRMatrix(content) {
      // default to a higher version → more pixels to play with; fall back to auto if the data is too big
      let data
      try { data = QRCode.create(content || DEFAULT_CONTENT, { errorCorrectionLevel: 'H', version: 9 }) }
      catch (e) { data = QRCode.create(content || DEFAULT_CONTENT, { errorCorrectionLevel: 'H' }) }
      const size = data.modules.size
      const matrix = []
      for (let y = 0; y < size; y++) {
        const row = []
        for (let x = 0; x < size; x++) row.push(data.modules.get(x, y) === 1)
        matrix.push(row)
      }
      return matrix
    }
    function pseudoRandom(a, b, seed) {
      const s = Math.sin(a * 127.1 + b * 311.7 + seed * 43.7) * 43758.5
      return s - Math.floor(s)
    }
    function frac(x) { return x - Math.floor(x) }
    function heart(u, v) {
      const x = u * 1.2, y = 1.2 - v * 2.4
      const a = x * x + y * y - 1
      return a * a * a - x * x * y * y * y <= 0
    }
    function moduleAt(wx, wz, matrix, offset, gridSize) {
      const c = Math.round(wx + offset), r = Math.round(wz + offset)
      if (r < 0 || c < 0 || r >= gridSize || c >= gridSize) return -1
      return matrix[r][c] ? 1 : 0
    }
    // classic caladium markings from leaf-local position (green margin → white veins → pink centre)
    // which variegation zone a leaf cell is in — same structure on every leaf (magenta midrib →
    // pink blade → radiating veins → green band → dark green margin)
    function leafZone(u, v, e1, e2) {
      if (e1 || e2) return 'margin'
      const t = Math.abs(u)
      if (t < 0.07) return 'midrib'
      if (t > 0.68) return 'gband'
      if (frac(t * 4 - v * 1.6) < 0.09) return 'vein'
      return 'blade'
    }

    // a leaf voxel locked to its own (col,row): tilt comes from per-cell height, never sideways.
    // on-tile cells carry the QR (dark/pale by module); overhang cells are pale → light quiet zone
    // on-tile cells stored with metadata (coloured later: topmost→QR, occluded→botanical); off-tile overhang fades
    function pushCell(onOut, offOut, col, row, H, offset, zone, gridSize) {
      // NO OVERHANG: leaves are clipped to the QR square — off-tile cells are dropped entirely
      if (col >= 0 && row >= 0 && col < gridSize && row < gridSize) onOut.push({ col, row, H, zone })
    }
    // stalk voxel snapped to the grid; pre-coloured by module so it's QR-correct wherever exposed
    function pushStalk(onOut, offOut, wx, wy, wz, matrix, offset, gridSize) {
      const col = Math.round(wx + offset), row = Math.round(wz + offset)
      if (col >= 0 && row >= 0 && col < gridSize && row < gridSize) onOut.push({ col, row, H: wy, c: matrix[row][col] ? STALK_DARK : GREEN_PALE, fixed: true })
    }

    // grid-aligned heart leaf: one voxel per covered cell. it ARCHES (rise then nod over) by
    // shaping each cell's HEIGHT — never moving it sideways — so it stays locked to the QR.
    function buildLeaf(onOut, offOut, leaf, matrix, offset, gridSize) {
      const { cx, cz, az, size, baseH, rise, droop, cup } = leaf
      const ca = Math.cos(az), sa = Math.sin(az)
      const du = 1 / size, dv = 1 / (size * 1.7)
      const ext = Math.ceil(size * 2.4)
      const ccol = Math.round(cx + offset), crow = Math.round(cz + offset)
      let lmaxY = baseH

      // stalk: pot-top centre → leaf base
      const sSteps = Math.ceil(Math.hypot(cx, cz) + Math.abs(baseH - POT_H)) + 1
      for (let s = 0; s <= sSteps; s++) {
        const f = s / sSteps
        pushStalk(onOut, offOut, cx * f, POT_H + (baseH - POT_H) * f, cz * f, matrix, offset, gridSize)
      }

      // big leaves are allowed to overhang the tile — off-tile cells go to the fading overhang mesh
      for (let col = ccol - ext; col <= ccol + ext; col++) {
        for (let row = crow - ext; row <= crow + ext; row++) {
          const dx = (col - offset) - cx, dz = (row - offset) - cz
          const lz = dx * ca + dz * sa, lx = -dx * sa + dz * ca
          const u = lx / size, v = lz / (size * 1.7)
          if (v < 0 || v > 1 || u < -1 || u > 1) continue
          if (!heart(u, v)) continue
          const e1 = !heart(u + du, v) || !heart(u - du, v) || !heart(u, v + dv) || !heart(u, v - dv)
          const e2 = !heart(u + 2 * du, v) || !heart(u - 2 * du, v) || !heart(u, v + 2 * dv) || !heart(u, v - 2 * dv)
          const zone = leafZone(u, v, e1, e2)
          const H = baseH + v * rise - droop * v * v - cup * u * u   // arch up the spine + cup across the width (3D leaf)
          pushCell(onOut, offOut, col, row, Math.max(POT_H, H), offset, zone, gridSize)
          if (H > lmaxY) lmaxY = H
        }
      }
      return lmaxY
    }

    function buildPot(out) {
      for (let ly = 0; ly < POT_H; ly++) {
        const rOut = POT_R * (0.7 + 0.3 * ly / (POT_H - 1))
        const rIn = rOut - 1.3
        const rim = ly === POT_H - 1
        const m = Math.ceil(POT_R)
        for (let x = -m; x <= m; x++) for (let z = -m; z <= m; z++) {
          const d = Math.hypot(x, z)
          if (d <= rOut && d >= rIn) out.push({ x, y: ly, z, c: rim ? POT_RIM : POT_BODY })
        }
      }
      const rFill = POT_R * 0.74, mf = Math.ceil(POT_R)
      for (let x = -mf; x <= mf; x++) for (let z = -mf; z <= mf; z++) {
        if (Math.hypot(x, z) <= rFill) out.push({ x, y: POT_H - 1, z, c: POT_SOIL })
      }
    }

    function generatePlant(matrix) {
      const gridSize = matrix.length
      const offset = (gridSize - 1) / 2
      const ground = []
      let dark = 0, total = 0
      for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
          const isDark = matrix[row][col]
          total++; if (isDark) dark++
          let c
          c = isDark ? FLOOR_DARK : CREAM // monotone floor
          ground.push({ col, row, baseY: 0, c })
        }
      }

      const pot = []
      buildPot(pot)

      const leaves = []
      const overhang = []
      // climbing spiral (golden angle): each leaf at its own height + angle up a central stem → leaves
      // don't intersect, all petioles run to the middle, vertical space spreads them. lower leaves get
      // occluded from above (kept botanical); the exposed top leaves carry the QR. thin (1 voxel) each.
      const sc = gridSize / 33
      const N = Math.max(8, Math.min(10, 8 + Math.round((dark / total) * 2)))
      const GOLDEN = 2.39996323
      const MAX_TILT = 1.4 // tan(~55°) — petioles never tilt flatter than this
      let maxY = 0, maxR = 0
      for (let k = 0; k < N; k++) {
        const qrBit = matrix[(k * 7) % gridSize][(k * 13) % gridSize] ? 1 : 0
        const r2 = pseudoRandom(k, 2, qrBit + 3), r3 = pseudoRandom(k, 5, qrBit + 7)
        const r4 = pseudoRandom(k, 8, qrBit + 2), r5 = pseudoRandom(k, 11, qrBit + 9), r6 = pseudoRandom(k, 13, qrBit)
        const t = N > 1 ? k / (N - 1) : 0
        const az = k * GOLDEN
        const rc = (2.5 + r3 * 3.5) * sc                       // petiole tilts out → leaves extend horizontally
        const climbH = (3 + t * 30 + r5 * 3) * sc             // tall + EVEN vertical spread → leaves distribute up the stem, no top bunching
        const baseH = POT_H + Math.max(climbH, rc / MAX_TILT)  // cap petiole tilt; pushes far-out leaves up
        const leaf = {
          cx: Math.cos(az) * rc, cz: Math.sin(az) * rc, az,
          size: (5 + t * 2.5 + r2 * 3.5) * sc,                 // gentle size trend + variation (no oversized top leaves)
          baseH,
          rise: (8 + r6 * 5) * sc,
          droop: (3 + r4 * 3) * sc,                            // gentle nod so the lowest leaf looks natural
          cup: (3 + r3 * 2.5) * sc
        }
        const ly = buildLeaf(leaves, overhang, leaf, matrix, offset, gridSize)
        if (ly > maxY) maxY = ly
        const rr = rc + leaf.size * 1.7; if (rr > maxR) maxR = rr
      }
      if (POT_R > maxR) maxR = POT_R

      // top-down only sees the HIGHEST voxel per cell → give that the QR colour; paint the
      // occluded under-leaves with organic botanical variegation so the plant reads botanical, not code-like
      const cellTop = new Map()
      for (const v of leaves) {
        const key = v.col * 4096 + v.row
        const m = cellTop.get(key)
        if (m === undefined || v.H > m) cellTop.set(key, v.H)
      }
      for (const v of leaves) {
        v.x = v.col - offset; v.z = v.row - offset; v.y = v.H
        if (v.fixed) continue // stalks already module-coloured
        if (v.H >= cellTop.get(v.col * 4096 + v.row) - 0.001) {
          v.c = matrix[v.row][v.col] ? ZD[v.zone] : ZL[v.zone]   // exposed → QR via light/dark, variegation hue kept
        } else {
          v.c = ZN[v.zone]                                        // occluded → natural variegation
        }
      }

      return { ground, pot, leaves, overhang, gridSize, maxY, maxR }
    }

    // ---- scene -------------------------------------------------------------
    const app = document.getElementById('app')
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.outputColorSpace = THREE.SRGBColorSpace
    app.appendChild(renderer.domElement)

    const scene = new THREE.Scene()
    scene.background = new THREE.Color('#f6f1f3')
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 8000)
    scene.add(new THREE.HemisphereLight(0xffffff, 0xb0a0a6, 1.05))
    const sun = new THREE.DirectionalLight(0xffffff, 1.15)
    sun.position.set(-10, 28, 12)
    scene.add(sun)

    const cubeGeo = new THREE.BoxGeometry(CUBE, CUBE, CUBE)
    const groundMat = new THREE.MeshStandardMaterial({ roughness: 0.95, flatShading: true })
    const leafMat = new THREE.MeshStandardMaterial({ roughness: 0.85, flatShading: true })   // opaque: it IS the QR
    const overhangMat = new THREE.MeshStandardMaterial({ roughness: 0.85, flatShading: true, transparent: true, opacity: 1 }) // off-tile tips, fade when flat
    const potMat = new THREE.MeshStandardMaterial({ roughness: 0.9, flatShading: true, transparent: true, opacity: 1 })

    let groundMesh = null, leafMesh = null, overhangMesh = null, potMesh = null
    let gridSize = 0, plantMaxY = 0, plantMaxR = 0
    const obj = new THREE.Object3D()

    function build(content) {
      const data = generatePlant(generateQRMatrix(content))
      gridSize = data.gridSize; plantMaxY = data.maxY; plantMaxR = data.maxR
      const offset = (gridSize - 1) / 2

      if (groundMesh) { scene.remove(groundMesh); groundMesh.dispose() }
      if (leafMesh) { scene.remove(leafMesh); leafMesh.dispose() }
      if (overhangMesh) { scene.remove(overhangMesh); overhangMesh.dispose() }
      if (potMesh) { scene.remove(potMesh); potMesh.dispose() }

      groundMesh = new THREE.InstancedMesh(cubeGeo, groundMat, data.ground.length)
      const tc = new THREE.Color()
      for (let i = 0; i < data.ground.length; i++) {
        const b = data.ground[i]
        obj.position.set(b.col - offset, b.baseY + CUBE / 2, b.row - offset)
        obj.updateMatrix(); groundMesh.setMatrixAt(i, obj.matrix)
        tc.set(b.c); groundMesh.setColorAt(i, tc)
      }
      groundMesh.instanceMatrix.needsUpdate = true; groundMesh.instanceColor.needsUpdate = true
      scene.add(groundMesh)

      potMesh = new THREE.InstancedMesh(cubeGeo, potMat, data.pot.length)
      for (let i = 0; i < data.pot.length; i++) {
        const p = data.pot[i]
        obj.position.set(p.x, p.y + CUBE / 2, p.z)
        obj.updateMatrix(); potMesh.setMatrixAt(i, obj.matrix)
        potMesh.setColorAt(i, p.c)
      }
      potMesh.instanceMatrix.needsUpdate = true; potMesh.instanceColor.needsUpdate = true
      scene.add(potMesh)

      leafMesh = new THREE.InstancedMesh(cubeGeo, leafMat, data.leaves.length)
      for (let i = 0; i < data.leaves.length; i++) {
        const p = data.leaves[i]
        obj.position.set(p.x, p.y + CUBE / 2, p.z)
        obj.updateMatrix(); leafMesh.setMatrixAt(i, obj.matrix)
        leafMesh.setColorAt(i, p.c)
      }
      leafMesh.instanceMatrix.needsUpdate = true; leafMesh.instanceColor.needsUpdate = true
      scene.add(leafMesh)

      overhangMesh = new THREE.InstancedMesh(cubeGeo, overhangMat, data.overhang.length)
      for (let i = 0; i < data.overhang.length; i++) {
        const p = data.overhang[i]
        obj.position.set(p.x, p.y + CUBE / 2, p.z)
        obj.updateMatrix(); overhangMesh.setMatrixAt(i, obj.matrix)
        overhangMesh.setColorAt(i, p.c)
      }
      overhangMesh.instanceMatrix.needsUpdate = true
      if (overhangMesh.instanceColor) overhangMesh.instanceColor.needsUpdate = true // null when no overhang
      scene.add(overhangMesh)
    }

    // ---- camera: flat↔iso + drag orbit ------------------------------------
    let t = 0, target = 1
    let az = 0.7, el = 0.6
    const pos = new THREE.Vector3(), tgt = new THREE.Vector3(), dir = new THREE.Vector3(), up = new THREE.Vector3()
    const UP_FLAT = new THREE.Vector3(0, 0, -1), UP_ISO = new THREE.Vector3(0, 1, 0)
    function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2 }

    let last = performance.now()
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000); last = now
      t += (target - t) * 0.10
      if (Math.abs(target - t) < 0.0004) t = target
      const e = easeInOut(t)

      const w = window.innerWidth, h = window.innerHeight, aspect = w / h
      const span = gridSize
      const flatHalf = Math.max(span * 0.5, span / (2 * aspect)) * 1.14
      const isoHalf = Math.max(span * 0.6, plantMaxR * 0.82, plantMaxY * 0.55) * 1.1
      const halfH = flatHalf + (isoHalf - flatHalf) * e
      camera.top = halfH; camera.bottom = -halfH; camera.left = -halfH * aspect; camera.right = halfH * aspect
      camera.updateProjectionMatrix()

      const elNow = (Math.PI / 2) * (1 - e) + el * e
      const azNow = az * e
      dir.set(Math.cos(elNow) * Math.sin(azNow), Math.sin(elNow), Math.cos(elNow) * Math.cos(azNow))
      up.copy(UP_FLAT).lerp(UP_ISO, e).normalize()
      tgt.set(0, plantMaxY * 0.4 * e, 0)
      pos.copy(dir).multiplyScalar(span * 6).add(tgt)
      camera.position.copy(pos); camera.up.copy(up); camera.lookAt(tgt)

      // plant never fades (it is the QR); pot + petals fade. sway ×e → 0 when flat, so the match holds at rest
      const o = e <= 0.2 ? 0 : Math.min(1, (e - 0.2) / 0.55)
      const op = o * o * (3 - 2 * o)
      potMat.opacity = op; overhangMat.opacity = op   // overhang fades out when flat → clean square QR
      if (leafMesh) {
        const tm = now / 1000
        const sz = Math.sin(tm * 0.9) * 0.012 * e, sx = Math.cos(tm * 0.7) * 0.008 * e
        leafMesh.rotation.z = sz; leafMesh.rotation.x = sx
        if (overhangMesh) { overhangMesh.rotation.z = sz; overhangMesh.rotation.x = sx }
      }

      renderer.render(scene, camera)
      requestAnimationFrame(frame)
    }

    // ---- interaction -------------------------------------------------------
    const btn = document.getElementById('toggle')
    const input = document.getElementById('content')
    input.value = DEFAULT_CONTENT
    function toggle() {
      target = target === 0 ? 1 : 0
      if (target === 0) az = Math.atan2(Math.sin(az), Math.cos(az)) // un-spin the shortest way back to top-down
      btn.textContent = target === 1 ? 'flatten to QR' : 'grow caladium'
    }
    btn.addEventListener('click', toggle)

    let dragging = false, lastX = 0, lastY = 0, moved = 0
    const cv = renderer.domElement
    cv.addEventListener('pointerdown', function (ev) { dragging = true; lastX = ev.clientX; lastY = ev.clientY; moved = 0; cv.setPointerCapture(ev.pointerId) })
    cv.addEventListener('pointermove', function (ev) {
      if (!dragging) return
      const dx = ev.clientX - lastX, dy = ev.clientY - lastY
      lastX = ev.clientX; lastY = ev.clientY; moved += Math.abs(dx) + Math.abs(dy)
      az -= dx * 0.006
      el = Math.max(0.2, Math.min(1.45, el + dy * 0.005))
    })
    cv.addEventListener('pointerup', function () { dragging = false; if (moved < 6) toggle() })

    let debounce = null
    input.addEventListener('input', function () { clearTimeout(debounce); debounce = setTimeout(function () { build(input.value) }, 250) })
    window.addEventListener('resize', function () { renderer.setSize(window.innerWidth, window.innerHeight) })

    build(DEFAULT_CONTENT)
    requestAnimationFrame(frame)
  </script>
</body>
</html>
