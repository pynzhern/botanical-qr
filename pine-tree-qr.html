<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pine Tree QR — prototype</title>
  <style>
    :root { --ink: #25322b; --muted: #5e6f64; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #f4f6f4; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    .hud { position: fixed; inset: 0; pointer-events: none; padding: 26px;
      display: flex; flex-direction: column; justify-content: space-between; }
    .eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
    .title { font-size: 24px; font-weight: 650; color: var(--ink); letter-spacing: -0.01em; margin-top: 4px; }
    .sub { font-size: 13px; color: var(--muted); max-width: 32ch; line-height: 1.45; margin-top: 6px; }

    .bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
    .controls { pointer-events: auto; display: flex; gap: 10px; align-items: center; }
    input {
      pointer-events: auto; font: inherit; font-size: 14px; color: var(--ink);
      background: #fff; border: 1px solid rgba(37,50,43,0.14); border-radius: 12px;
      padding: 10px 14px; width: 230px; outline: none;
    }
    input:focus { border-color: #4a7c4e; }
    button {
      pointer-events: auto; font: inherit; font-size: 13px; font-weight: 600; color: var(--ink);
      background: rgba(255,255,255,0.7); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border: 1px solid rgba(37,50,43,0.12); border-radius: 999px; padding: 10px 18px; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #fff; }
    button:active { transform: scale(0.97); }
    .hint { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <div class="top">
      <div class="eyebrow">pine tree qr · matched</div>
      <div class="title">the needles ARE the QR</div>
      <div class="sub">a conical canopy of grid-aligned voxels; each needle's top is dark or pale green by the module under it, so the canopy carries the QR — the top-down scans and the 3D tree shows the code. tap to tilt.</div>
    </div>
    <div class="bottom">
      <span class="hint">tap the scene to flatten / tilt</span>
      <div class="controls">
        <input id="content" type="url" spellcheck="false" autocomplete="off" autocapitalize="off" />
        <button id="toggle">flatten to QR</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://esm.sh/three@0.160.0" } }
  </script>

  <script type="module">
    import * as THREE from 'three'
    import QRCode from 'https://esm.sh/qrcode@1.5.3'

    // ---- constants (mirrors Reactiive's cherry-blossom constants.ts) -------
    const CUBE = 1                       // one voxel = 1 world unit
    const TRUNK_RADIUS = 2.5
    const TRUNK_LAYERS = 12
    const MAX_CANOPY_LAYERS = 16         // taller than the dome → a pointier pine
    const CANOPY_OUTER_RADIUS_FACTOR = 0.46
    const DEFAULT_CONTENT = 'https://pynzhern.com'

    // matched palette — like the caladium, the topmost voxel per cell is coloured by the QR module
    // (dark green for dark, pale green for light) so the canopy ITSELF carries the QR and reads in 3D.
    const FLOOR_DARK = new THREE.Color('#4a5a3a')  // monotone forest floor (dark module)
    const CREAM = new THREE.Color('#d8c9a4')        // dirt path (light module)
    const TRUNK = new THREE.Color('#6b4a32')        // brown trunk (occluded under the canopy)
    const PINE_DARK = new THREE.Color('#27512f')    // dark-module needles
    const PINE_PALE = new THREE.Color('#c3d6ab')    // light-module needles (frosted variegation)
    const PINE_LOW = new THREE.Color('#27512f')     // occluded needles: low → high gradient
    const PINE_HIGH = new THREE.Color('#3f7a44')

    // ---- QR → boolean matrix (verbatim from their qr-matrix.ts) ------------
    function generateQRMatrix(content) {
      const data = QRCode.create(content || DEFAULT_CONTENT, { errorCorrectionLevel: 'M' })
      const size = data.modules.size
      const matrix = []
      for (let y = 0; y < size; y++) {
        const row = []
        for (let x = 0; x < size; x++) row.push(data.modules.get(x, y) === 1)
        matrix.push(row)
      }
      return matrix
    }

    function pseudoRandom(col, row, seed) {
      const s = Math.sin(col * 127.1 + row * 311.7 + seed * 43.7) * 43758.5
      return s - Math.floor(s)
    }

    // ---- matched voxel generator: cone canopy whose TOP carries the QR ------
    function generateBlocks(matrix) {
      const gridSize = matrix.length
      const cx = (gridSize - 1) / 2, cy = (gridSize - 1) / 2
      const canopyBase = TRUNK_LAYERS * CUBE
      const canopyR = gridSize * CANOPY_OUTER_RADIUS_FACTOR

      // ground: monotone QR floor (shows where the canopy doesn't cover — the finders, the outer ring)
      const ground = []
      for (let row = 0; row < gridSize; row++)
        for (let col = 0; col < gridSize; col++)
          ground.push({ col, row, baseY: 0, c: matrix[row][col] ? FLOOR_DARK : CREAM })

      const vox = [] // { col, row, baseY, nat, c }
      // trunk column at the centre (stays brown — occluded under the canopy)
      for (let row = 0; row < gridSize; row++)
        for (let col = 0; col < gridSize; col++) {
          if (Math.hypot(col - cx, row - cy) >= TRUNK_RADIUS) continue
          for (let layer = 0; layer < TRUNK_LAYERS; layer++) vox.push({ col, row, baseY: layer * CUBE, nat: TRUNK })
        }
      // conical canopy over the WHOLE central disc — dark AND light cells, so the QR mottles the needles
      for (let row = 0; row < gridSize; row++)
        for (let col = 0; col < gridSize; col++) {
          const dist = Math.hypot(col - cx, row - cy)
          if (dist >= canopyR) continue
          const t = 1 - dist / canopyR                    // 1 centre → 0 edge
          const jitter = pseudoRandom(col, row, 500) - 0.5
          const layers = Math.max(1, Math.round(MAX_CANOPY_LAYERS * t + jitter * 1.6))
          for (let layer = 0; layer < layers; layer++) {
            const shade = layers > 1 ? layer / (layers - 1) : 1
            vox.push({ col, row, baseY: canopyBase + layer * CUBE, nat: PINE_LOW.clone().lerp(PINE_HIGH, shade) })
          }
        }

      // topmost voxel per cell carries the QR (dark/pale needle by module); the rest stay natural pine
      const cellTop = new Map()
      for (const v of vox) { const k = v.col * 4096 + v.row; const m = cellTop.get(k); if (m === undefined || v.baseY > m) cellTop.set(k, v.baseY) }
      let maxY = 0
      for (const v of vox) {
        v.c = v.baseY >= cellTop.get(v.col * 4096 + v.row) - 0.001 ? (matrix[v.row][v.col] ? PINE_DARK : PINE_PALE) : v.nat
        if (v.baseY > maxY) maxY = v.baseY
      }

      return { ground, vox, gridSize, maxY }
    }

    // ---- scene -------------------------------------------------------------
    const app = document.getElementById('app')
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.outputColorSpace = THREE.SRGBColorSpace
    app.appendChild(renderer.domElement)

    const scene = new THREE.Scene()
    scene.background = new THREE.Color('#f4f6f4')

    // orthographic — height collapses in top-down, so lifted canopy blocks stay
    // on their (col,row) footprint and the QR keeps reading (perspective parallax breaks it)
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 4000)

    scene.add(new THREE.HemisphereLight(0xffffff, 0x9aae9a, 1.0))
    const sun = new THREE.DirectionalLight(0xffffff, 1.2)
    sun.position.set(-12, 30, 10)
    scene.add(sun)

    const cubeGeo = new THREE.BoxGeometry(CUBE, CUBE, CUBE)
    const cubeMat = new THREE.MeshStandardMaterial({ roughness: 0.95, flatShading: true })
    const model = new THREE.Group()
    scene.add(model)

    let mesh = null
    let gridSize = 0
    let plantMaxY = 0
    const tmpObj = new THREE.Object3D()

    function build(content) {
      const data = generateBlocks(generateQRMatrix(content))
      gridSize = data.gridSize; plantMaxY = data.maxY
      const offset = (gridSize - 1) / 2
      const all = data.ground.concat(data.vox)

      if (mesh) { model.remove(mesh); mesh.dispose() }
      mesh = new THREE.InstancedMesh(cubeGeo, cubeMat, all.length)
      for (let i = 0; i < all.length; i++) {
        const b = all[i]
        tmpObj.position.set(b.col - offset, b.baseY + CUBE / 2, b.row - offset)
        tmpObj.updateMatrix()
        mesh.setMatrixAt(i, tmpObj.matrix)
        mesh.setColorAt(i, b.c)
      }
      mesh.instanceMatrix.needsUpdate = true
      mesh.instanceColor.needsUpdate = true
      model.add(mesh)
    }

    // ---- flat ↔ iso camera morph (mirrors FLAT/ISO angles + LERP_SPEED) ----
    let t = 0          // 0 = flat top-down QR, 1 = isometric pine
    let target = 1
    const pos = new THREE.Vector3()
    const tgt = new THREE.Vector3()
    function easeInOut(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2 }

    const dir = new THREE.Vector3()
    const up = new THREE.Vector3()
    const DIR_FLAT = new THREE.Vector3(0, 1, 0.0001).normalize()
    const DIR_ISO = new THREE.Vector3(0.95, 1.05, 1.3).normalize()
    const UP_FLAT = new THREE.Vector3(0, 0, -1)   // avoids gimbal when looking straight down
    const UP_ISO = new THREE.Vector3(0, 1, 0)

    function frame() {
      t += (target - t) * 0.10
      if (Math.abs(target - t) < 0.0004) t = target
      const e = easeInOut(t)

      const span = gridSize
      const canopyMid = TRUNK_LAYERS + MAX_CANOPY_LAYERS * 0.4

      // ortho frustum: tighter when flat (more zoomed in, like VIEW_SCALE_2D), looser in iso
      const aspect = window.innerWidth / window.innerHeight
      const halfH = span * (0.6 + 0.32 * e)
      camera.top = halfH
      camera.bottom = -halfH
      camera.left = -halfH * aspect
      camera.right = halfH * aspect
      camera.updateProjectionMatrix()

      // orbit on a fixed-radius sphere; flat = straight down, iso = three-quarter
      dir.copy(DIR_FLAT).lerp(DIR_ISO, e).normalize()
      up.copy(UP_FLAT).lerp(UP_ISO, e).normalize()
      tgt.set(0, canopyMid * 0.55 * e, 0)
      pos.copy(dir).multiplyScalar(span * 4).add(tgt)

      camera.position.copy(pos)
      camera.up.copy(up)
      camera.lookAt(tgt)

      renderer.render(scene, camera)
      requestAnimationFrame(frame)
    }

    // ---- interaction -------------------------------------------------------
    const btn = document.getElementById('toggle')
    const input = document.getElementById('content')
    input.value = DEFAULT_CONTENT

    function toggle() {
      target = target === 0 ? 1 : 0
      btn.textContent = target === 1 ? 'flatten to QR' : 'grow pine'
    }
    btn.addEventListener('click', toggle)
    renderer.domElement.addEventListener('click', toggle)

    let debounce = null
    input.addEventListener('input', function () {
      clearTimeout(debounce)
      debounce = setTimeout(function () { build(input.value) }, 250)
    })

    window.addEventListener('resize', function () {
      renderer.setSize(window.innerWidth, window.innerHeight) // ortho frustum recomputed each frame
    })

    build(DEFAULT_CONTENT)
    frame()
  </script>
</body>
</html>
